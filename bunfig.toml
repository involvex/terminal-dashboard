# bunfig.toml - Bun configuration file
# https://bun.sh/docs/runtime/bunfig

[install]
# Save exact versions instead of semver ranges
# exact = true

# Set default registry
registry = "https://registry.npmjs.org/"

# Set node_modules folder
node_modules = "node_modules"

# Cache directory
cache = "node_modules/.cache/bun"

[test]
# Test runner configuration
# Coverage reporting
# coverage = true

# Run tests in parallel
# parallel = true

# Watch mode
# watch = true

[dev]
# Development server configuration
# Port for dev server
port = 3000

# Host for dev server  
host = "localhost"

# Auto-reload on file changes
hot = true

[build]
# Build output directory
outdir = "dist"

# Minification
minify = true

# Source maps
sourcemap = true

# Target environment
target = "node"

[package]
# Package.json field order
fields = ["name", "version", "description"]

[run]
# Node.js compatibility mode
compat = "node"

loader = {
  ".css" = "css",
".js" = "jsx", ".ts" = "tsx",
".tsx" = "tsx",
".json" = "json",


}

env = {
  



}NODE_ENV = "development"# Environment variables".txt" = "text"# Loader configuration for file types
